name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  GO_VERSION: '1.21'
  RUST_VERSION: 'stable'

jobs:
  # ============================================================================
  # RUST CHECKS
  # ============================================================================
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dpf
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Check formatting
        run: cargo fmt -- --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dpf
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dpf
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev libpng-dev libwebp-dev
      
      - name: Run clippy
        run: cargo clippy -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dpf
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dpf
          cache-directories: |
            ~/.cargo/registry
            ~/.cargo/git
            target
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev libpng-dev libwebp-dev
      
      - name: Run tests
        run: cargo test --release --verbose
      
      - name: Run ignored tests (slow)
        run: cargo test --release -- --ignored
        continue-on-error: true

  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    needs: [rust-fmt, rust-clippy, rust-test]
    defaults:
      run:
        working-directory: dpf
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dpf
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev libpng-dev libwebp-dev
      
      - name: Build release binary
        run: cargo build --release --verbose
      
      - name: Strip binary
        run: strip target/release/dpf
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dpf-binary-linux
          path: dpf/target/release/dpf
          retention-days: 7

  # ============================================================================
  # RUST COVERAGE
  # ============================================================================
  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: dpf
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dpf
      
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin || true
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev libpng-dev libwebp-dev
      
      - name: Generate coverage
        run: cargo tarpaulin --out xml --out html --release --timeout 600
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-report
          path: |
            dpf/cobertura.xml
            dpf/tarpaulin-report.html
          retention-days: 30
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: dpf/cobertura.xml
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # GO CHECKS
  # ============================================================================
  go-fmt:
    name: Go Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-bridge
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go-bridge/go.sum
      
      - name: Check formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi

  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-bridge
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go-bridge/go.sum
      
      - name: Run go vet
        run: go vet ./...

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: [rust-build]
    defaults:
      run:
        working-directory: go-bridge
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go-bridge/go.sum
      
      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: dpf-binary-linux
          path: ${{ github.workspace }}/dpf/target/release/
      
      - name: Make binary executable
        run: chmod +x ${{ github.workspace }}/dpf/target/release/dpf
      
      - name: Get dependencies
        run: go mod download
      
      - name: Run tests
        run: go test -v -race -timeout 5m ./...
        env:
          DPF_BINARY_PATH: ${{ github.workspace }}/dpf/target/release/dpf
      
      - name: Generate coverage
        run: go test -race -coverprofile=coverage.out -timeout 5m ./...
        env:
          DPF_BINARY_PATH: ${{ github.workspace }}/dpf/target/release/dpf
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: go-bridge/coverage.out
          retention-days: 30
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: go-bridge/coverage.out
          flags: go
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: [go-fmt, go-vet, go-test]
    defaults:
      run:
        working-directory: go-bridge
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go-bridge/go.sum
      
      - name: Build
        run: go build -v ./...

  # ============================================================================
  # INTEGRATION TESTS
  # ============================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-build]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: dpf-binary-linux
          path: dpf/target/release/
      
      - name: Make binary executable
        run: chmod +x dpf/target/release/dpf
      
      - name: Test capabilities
        run: ./dpf/target/release/dpf caps
      
      - name: Create test image
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          mkdir -p /tmp/test-images
          convert -size 800x600 xc:blue /tmp/test-images/test.png
      
      - name: Test resize operation
        run: |
          echo '{"operation":"resize","input":"/tmp/test-images/test.png","output_dir":"/tmp/test-output","widths":[320,640]}' | \
            ./dpf/target/release/dpf process --job -
          ls -la /tmp/test-output/

  # ============================================================================
  # RELEASE
  # ============================================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [rust-build, go-build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/**/*.out
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
