name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Build all platforms ───────────────────────────────────────
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: dpf-linux-amd64
            strip: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: dpf-macos-arm64
            strip: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install Homebrew dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Setup Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools ffmpeg
          sudo ln -sf /usr/bin/musl-gcc /usr/bin/x86_64-linux-musl-gcc

      - name: Setup CC for musl
        if: runner.os == 'Linux'
        run: |
          echo "CC_x86_64_unknown_linux_musl=x86_64-linux-musl-gcc" >> $GITHUB_ENV

      - name: Clean all build caches
        run: |
          rm -rf dpf/target
          rm -rf ~/.cargo/registry/index
          rm -rf ~/.cargo/git/db

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: dpf/target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Build release
        run: |
          cd dpf
          cargo build --release --target ${{ matrix.target }}
          
          if [ "${{ matrix.strip }}" = "true" ]; then
            strip target/${{ matrix.target }}/release/dpf
          fi

      - name: Prepare artifact
        id: prepare
        run: |
          cp dpf/target/${{ matrix.target }}/release/dpf dpf-${{ matrix.artifact }}
          echo "filename=dpf-${{ matrix.artifact }}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dpf-${{ matrix.artifact }}
          compression-level: 0

  # ─── Create GitHub Release ─────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tar.gz packages
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            tar -czvf "${name}.tar.gz" -C "$dir" .
          done
          ls -lh *.tar.gz
          cp *.tar.gz ../

      - name: Generate checksums
        run: |
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            *.tar.gz
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
